name: Release

# Action version policy:
# - anchore/sbom-action is pinned to a commit SHA (third-party, higher supply-chain risk).
# - First-party actions/* and docker/* remain on major-version tags: GitHub's release
#   channel guarantees supply-chain integrity for these publishers.
# - Full SHA migration for all actions is deferred to v0.5.x via Renovate automation.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME} -X main.Revision=${GITHUB_SHA}" \
            -o pebblify-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/pebblify

      - uses: actions/upload-artifact@v7
        with:
          name: pebblify-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pebblify-${{ matrix.goos }}-${{ matrix.goarch }}

  attest-binaries:
    name: Attest binaries
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: pebblify-*
          merge-multiple: true

      - name: Attest binary provenance
        uses: actions/attest@v4
        with:
          subject-path: artifacts/pebblify-*

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: artifacts/
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest binary SBOM
        uses: actions/attest@v4
        with:
          subject-path: artifacts/pebblify-*
          sbom-path: sbom.spdx.json

  docker:
    name: Docker push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      attestations: write
      artifact-metadata: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Pebblify
            org.opencontainers.image.description=LevelDB to PebbleDB migration tool for Cosmos/CometBFT nodes.
            org.opencontainers.image.url=https://www.dockermint.io
            org.opencontainers.image.documentation=https://docs.dockermint.io/pebblify/
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Dockermint
            org.opencontainers.image.authors=Dockermint
            org.opencontainers.image.base.name=alpine:3.22

      - name: Build & push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Attest Docker image provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ steps.repo.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Promote image tags after attestation (surface real tags in GHCR UI)
        run: |
          set -euo pipefail
          DIGEST="${{ steps.push.outputs.digest }}"
          REPO="ghcr.io/${{ steps.repo.outputs.name }}"
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Promoting tag: $tag"
            docker buildx imagetools create --tag "$tag" "${REPO}@${DIGEST}"
          done <<< "${{ steps.meta.outputs.tags }}"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, attest-binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: pebblify-*
          merge-multiple: false

      - name: Prepare assets
        run: |
          mkdir -p release
          for dir in artifacts/pebblify-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            sha256sum "release/$name" >> release/checksums.txt
          done

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: |
            release/pebblify-*
            release/checksums.txt
