name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME} -X main.Revision=${GITHUB_SHA}" \
            -o pebblify-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/pebblify

      - uses: actions/upload-artifact@v7
        with:
          name: pebblify-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pebblify-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    name: Docker push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Pebblify
            org.opencontainers.image.description=LevelDB to PebbleDB migration tool for Cosmos/CometBFT nodes.
            org.opencontainers.image.url=https://www.dockermint.io
            org.opencontainers.image.documentation=https://docs.dockermint.io/pebblify/
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Dockermint
            org.opencontainers.image.authors=Dockermint
            org.opencontainers.image.base.name=alpine:3.22

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ github.event.head_commit.timestamp }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: pebblify-*
          merge-multiple: false

      - name: Prepare assets
        run: |
          mkdir -p release
          for dir in artifacts/pebblify-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
            sha256sum "release/$name" >> release/checksums.txt
          done

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: false
          body_path: CHANGELOG.md
          files: |
            release/pebblify-*
            release/checksums.txt
