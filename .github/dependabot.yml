version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    labels:
      - dependencies
      - go
    commit-message:
      prefix: deps
      include: scope
