name: Bug report
description: Report a reproducible bug in Pebblify.
title: "fix(scope): "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please review the
        [CLAUDE.md development workflow](../CLAUDE.md) and confirm this is not
        a known limitation. Fill in every required field — incomplete reports
        may be closed without investigation.

  - type: input
    id: area
    attributes:
      label: Affected feature / area
      description: >
        Which subcommand or internal package is affected?
        (e.g. `level-to-pebble`, `recover`, `verify`, `converter`, `progress`)
      placeholder: "e.g. level-to-pebble / converter"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe what went wrong."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Provide a minimal reproduction. Include:
        - OS + architecture (e.g. `linux/amd64`)
        - Pebblify version or commit SHA
        - Exact command run
        - Full error output / stack trace
      placeholder: |
        1. Run `pebblify level-to-pebble --source /path/to/db ...`
        2. Observe error: ...
        3. Expected: ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: >
        What must be true for this issue to be considered resolved?
      placeholder: |
        - [ ] The reported error no longer occurs under the same conditions
        - [ ] All existing tests pass (`go test ./...`)
        - [ ] golangci-lint reports zero issues
    validations:
      required: true

  - type: checkboxes
    id: compliance
    attributes:
      label: CLAUDE.md compliance
      options:
        - label: I have read CLAUDE.md and this report follows the project workflow.
          required: true
        - label: >
            I am not requesting a workaround that bypasses linting, tests, or
            CI steps.
          required: true
